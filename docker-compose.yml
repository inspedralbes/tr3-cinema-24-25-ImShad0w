services:
  postgres:
    image: postgres:16-alpine
    container_name: passmaster_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinema_user
      POSTGRES_PASSWORD: cinema_password
      POSTGRES_DB: cinema_db
    volumes:
      - ./db/db_data:/var/lib/postgresql/data
    networks:
      passmaster_network:
        aliases:
          - cinema_postgres
          - passmaster_postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: passmaster_frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_SOCKET_URL=http://passmaster_realtime:3001
    networks:
      - passmaster_network

  backend:
    container_name: passmaster_backend
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8002:8000"
    depends_on:
      - postgres
    networks:
      - passmaster_network

  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile.prod
    container_name: passmaster_realtime
    restart: unless-stopped
    ports:
      - "3003:3001"
    volumes:
      - ./realtime:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - passmaster_network

networks:
  passmaster_network:
    driver: bridge
